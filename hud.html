<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HUD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=VT323&family=Space+Grotesk:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        user-select: none;
        font-family: 'Space Grotesk', sans-serif;
      }
      .hud {
        width: 100%;
        height: 100%;
        background: rgba(20, 20, 24, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 10px;
        padding: 6px 12px;
        color: #f0f0f0;
        -webkit-app-region: drag;
      }
      .hud[data-running="true"] {
        border-color: rgba(204, 68, 68, 0.4);
        box-shadow: 0 0 12px rgba(204, 68, 68, 0.18);
      }
      .brand {
        font-family: 'Caveat', cursive;
        font-size: 22px;
        line-height: 1;
        color: #f0f0f0;
      }
      .hud[data-running="true"] .brand { color: #d65555; }

      .stats {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .cps {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 16px;
        line-height: 1;
        color: #fff;
        letter-spacing: -0.5px;
      }
      .label {
        font-family: 'VT323', monospace;
        font-size: 10px;
        letter-spacing: 1.5px;
        color: #888;
        text-transform: uppercase;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #555;
      }
      .hud[data-running="true"] .dot {
        background: #d65555;
        box-shadow: 0 0 6px rgba(214, 85, 85, 0.6);
        animation: pulse 1.1s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(0.85); }
        50% { transform: scale(1.15); }
      }
    </style>
  </head>
  <body>
    <div class="hud" id="hud" data-running="false" data-tauri-drag-region>
      <span class="brand">&#946;</span>
      <div class="stats">
        <div class="cps" id="cps">0</div>
        <div class="label" id="label">IDLE · 0</div>
      </div>
      <span class="dot"></span>
    </div>
    <script>
      const hud = document.getElementById('hud');
      const cpsEl = document.getElementById('cps');
      const labelEl = document.getElementById('label');
      let lastClickCount = 0;
      let lastTime = performance.now();
      let cps = 0;

      function setupTauri() {
        if (!window.__TAURI__ || !window.__TAURI__.event) {
          setTimeout(setupTauri, 200);
          return;
        }
        window.__TAURI__.event.listen('clicker-status', (event) => {
          const status = event.payload;
          hud.setAttribute('data-running', String(!!status.running));
          const now = performance.now();
          const dt = (now - lastTime) / 1000;
          if (dt > 0 && status.running) {
            const delta = (status.clickCount ?? 0) - lastClickCount;
            const rawCps = delta / dt;
            cps = cps * 0.6 + rawCps * 0.4;
            cpsEl.textContent = Math.round(cps);
          } else {
            cps = 0;
            cpsEl.textContent = '0';
          }
          lastClickCount = status.clickCount ?? 0;
          lastTime = now;
          labelEl.textContent = (status.running ? 'RUNNING' : 'IDLE') + ' · ' + (status.clickCount ?? 0);
        });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setupTauri);
      } else {
        setupTauri();
      }
    </script>
  </body>
</html>
