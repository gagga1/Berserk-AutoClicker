<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent !important;
        }
        .zone {
            position: absolute;
            pointer-events: none;
            border: 2px solid;
        }
        .zone-edge {
            background: rgba(0, 200, 255, 0.3);
            border-color: rgba(0, 200, 255, 0.8);
        }
        .zone-corner {
            background: rgba(255, 80, 80, 0.4);
            border-color: rgba(255, 80, 80, 0.9);
        }
        .zone-custom {
            background: rgba(255, 196, 0, 0.18);
            border-color: rgba(255, 196, 0, 0.92);
            border-style: dashed;
        }
        .zone-disabled {
            background: rgba(128, 128, 128, 0.15);
            border-color: rgba(128, 128, 128, 0.5);
            border-style: dashed;
        }
        .zone-monitor {
            background: transparent;
            border-color: rgba(255, 255, 255, 0.28);
            border-style: solid;
        }
        #overlay-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
        .fade-out {
            animation: fadeOut 5s ease forwards;
        }
        body.picking {
            cursor: crosshair;
            background: rgba(0, 0, 0, 0.08) !important;
        }
        #pick-rect {
            position: absolute;
            display: none;
            background: rgba(0, 200, 255, 0.18);
            border: 2px solid rgba(0, 200, 255, 0.95);
            pointer-events: none;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.4);
        }
        #pick-hint {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: rgba(255, 255, 255, 0.95);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            letter-spacing: 1px;
            display: none;
            pointer-events: none;
        }
        body.picking #pick-hint {
            display: block;
        }
    </style>
</head>
<body>
    <div id="overlay-container"></div>
    <div id="pick-rect"></div>
    <div id="pick-hint">Drag to select zone — ESC to cancel</div>

    <script>
        const container = document.getElementById('overlay-container');
        const pickRect = document.getElementById('pick-rect');
        let picking = false;
        let startScreen = null;
        let startClient = null;

        function setupTauriListener() {
            if (!window.__TAURI__ || !window.__TAURI__.event) {
                console.log('[Overlay] Tauri not ready, retrying...');
                setTimeout(setupTauriListener, 200);
                return;
            }

            window.__TAURI__.event.listen('zone-data', (event) => {
                renderZones(event.payload);
            });

            window.__TAURI__.event.listen('clear-zones', () => {
                container.innerHTML = '';
                container.classList.remove('fade-out');
            });

            window.__TAURI__.event.listen('pick-mode-start', () => {
                picking = true;
                startScreen = null;
                startClient = null;
                container.innerHTML = '';
                container.classList.remove('fade-out');
                pickRect.style.display = 'none';
                document.body.classList.add('picking');
            });

            window.addEventListener('mousedown', (e) => {
                if (!picking) return;
                e.preventDefault();
                startScreen = { x: e.screenX, y: e.screenY };
                startClient = { x: e.clientX, y: e.clientY };
                pickRect.style.display = 'block';
                pickRect.style.left = e.clientX + 'px';
                pickRect.style.top = e.clientY + 'px';
                pickRect.style.width = '0px';
                pickRect.style.height = '0px';
            });

            window.addEventListener('mousemove', (e) => {
                if (!picking || !startClient) return;
                const left = Math.min(startClient.x, e.clientX);
                const top = Math.min(startClient.y, e.clientY);
                const w = Math.abs(e.clientX - startClient.x);
                const h = Math.abs(e.clientY - startClient.y);
                pickRect.style.left = left + 'px';
                pickRect.style.top = top + 'px';
                pickRect.style.width = w + 'px';
                pickRect.style.height = h + 'px';
            });

            window.addEventListener('mouseup', (e) => {
                if (!picking) return;
                e.preventDefault();
                if (!startScreen) {
                    finishPick({ x: 0, y: 0, width: 0, height: 0, cancelled: true });
                    return;
                }
                const dpr = window.devicePixelRatio || 1;
                const x1 = startScreen.x;
                const y1 = startScreen.y;
                const x2 = e.screenX;
                const y2 = e.screenY;
                const left = Math.round(Math.min(x1, x2) * dpr);
                const top = Math.round(Math.min(y1, y2) * dpr);
                const width = Math.round(Math.abs(x2 - x1) * dpr);
                const height = Math.round(Math.abs(y2 - y1) * dpr);
                if (width < 2 || height < 2) {
                    finishPick({ x: 0, y: 0, width: 0, height: 0, cancelled: true });
                    return;
                }
                finishPick({ x: left, y: top, width, height, cancelled: false });
            });

            window.addEventListener('keydown', (e) => {
                if (!picking) return;
                if (e.key === 'Escape') {
                    e.preventDefault();
                    finishPick({ x: 0, y: 0, width: 0, height: 0, cancelled: true });
                }
            });

            console.log('[Overlay] Event listeners registered');
        }

        function finishPick(payload) {
            picking = false;
            startScreen = null;
            startClient = null;
            pickRect.style.display = 'none';
            document.body.classList.remove('picking');
            window.__TAURI__.event.emit('pick-zone-result', payload);
        }

        function renderZones(data) {
            container.innerHTML = '';
            container.classList.remove('fade-out');
            void container.offsetWidth;
            container.classList.add('fade-out');

            if (!data) return;

            const sw = data.screenWidth;
            const sh = data.screenHeight;
            const monitors = Array.isArray(data.monitors) && data.monitors.length > 0
                ? data.monitors
                : [{ x: 0, y: 0, width: sw, height: sh }];

            for (const monitor of monitors) {
                addZone(monitor.x, monitor.y, monitor.width, monitor.height, 'zone-monitor');
            }

            if (data.customStopZoneEnabled && data.customStopZone) {
                addZone(
                    data.customStopZone.x,
                    data.customStopZone.y,
                    data.customStopZone.width,
                    data.customStopZone.height,
                    'zone-custom'
                );
            }

            for (const monitor of monitors) {
                renderMonitorZones(monitor, data);
            }
        }

        function renderMonitorZones(monitor, data) {
            if (data.edgeStopEnabled) {
                const cTL = data.cornerStopEnabled ? data.cornerStopTL : 0;
                const cTR = data.cornerStopEnabled ? data.cornerStopTR : 0;
                const cBL = data.cornerStopEnabled ? data.cornerStopBL : 0;
                const cBR = data.cornerStopEnabled ? data.cornerStopBR : 0;

                addZone(
                    monitor.x + cTL,
                    monitor.y,
                    monitor.width - cTL - cTR,
                    data.edgeStopTop,
                    'zone-edge'
                );
                addZone(
                    monitor.x + cBL,
                    monitor.y + monitor.height - data.edgeStopBottom,
                    monitor.width - cBL - cBR,
                    data.edgeStopBottom,
                    'zone-edge'
                );
                addZone(
                    monitor.x,
                    monitor.y + cTL,
                    data.edgeStopLeft,
                    monitor.height - cTL - cBL,
                    'zone-edge'
                );
                addZone(
                    monitor.x + monitor.width - data.edgeStopRight,
                    monitor.y + cTR,
                    data.edgeStopRight,
                    monitor.height - cTR - cBR,
                    'zone-edge'
                );
            }

            if (data.cornerStopEnabled) {
                addZone(monitor.x, monitor.y, data.cornerStopTL, data.cornerStopTL, 'zone-corner');
                addZone(
                    monitor.x + monitor.width - data.cornerStopTR,
                    monitor.y,
                    data.cornerStopTR,
                    data.cornerStopTR,
                    'zone-corner'
                );
                addZone(
                    monitor.x,
                    monitor.y + monitor.height - data.cornerStopBL,
                    data.cornerStopBL,
                    data.cornerStopBL,
                    'zone-corner'
                );
                addZone(
                    monitor.x + monitor.width - data.cornerStopBR,
                    monitor.y + monitor.height - data.cornerStopBR,
                    data.cornerStopBR,
                    data.cornerStopBR,
                    'zone-corner'
                );
            }
        }

        function addZone(x, y, w, h, cls) {
            const scale = window.devicePixelRatio || 1;
            x = x / scale;
            y = y / scale;
            w = w / scale;
            h = h / scale;
            
            if (w <= 0 || h <= 0) return;
            const div = document.createElement('div');
            div.className = 'zone ' + cls;
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.style.width = w + 'px';
            div.style.height = h + 'px';
            container.appendChild(div);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', setupTauriListener);
        } else {
            setupTauriListener();
        }
    </script>
</body>
</html>
